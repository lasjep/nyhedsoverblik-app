name: Nyhedsoverblik
options:
  deploymentTarget:
    iOS: "26.0"   # Liquid Glass-APIs (glassEffect m.fl.) — iPad'en kører 26.5
  createIntermediateGroups: true

targets:
  NyhedsoverblikIOS:
    type: application
    platform: iOS
    sources:
      # iOS-specifik kode (app-entry + assets)
      - path: NyhedsoverblikIOS
      # Delt kodebase med macOS-appen — mac-only filer er #if os(macOS)-afskærmet
      - path: ../Sources/Nyhedsoverblik
        excludes:
          - "AppIcon.icns"
    info:
      path: NyhedsoverblikIOS/Info.plist
      properties:
        CFBundleDisplayName: Nyhedsoverblik
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Nyheds-thumbnails kommer fra vilkårlige CDN'er — tillad http-billeder
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dk.lvj.nyhedsoverblik
        PRODUCT_NAME: Nyhedsoverblik
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: X7P2566P6D   # Lasse Vestergaard (Personal Team)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        SWIFT_VERSION: "5.9"

schemes:
  NyhedsoverblikIOS:
    build:
      targets:
        NyhedsoverblikIOS: all
    run:
      config: Debug
