name: NyhedsoverblikMac
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  Nyhedsoverblik:
    type: application
    platform: macOS
    sources:
      - path: ../Sources/Nyhedsoverblik
    entitlements:
      path: entitlements/App.entitlements
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Nyhedsoverblik
        CFBundleName: Nyhedsoverblik
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "2"
        CFBundleIconFile: AppIcon
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - nyhedsoverblik
            CFBundleURLName: dk.nyhedsoverblik.app
    dependencies:
      - target: NyhedsoverblikWidget
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dk.nyhedsoverblik.app
        PRODUCT_NAME: Nyhedsoverblik
        DEVELOPMENT_TEAM: X7P2566P6D
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: "1.1"
        COMBINE_HIDPI_IMAGES: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"

  NyhedsoverblikWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: ../Sources/NyhedsoverblikWidget
        excludes:
          - "Info.plist"
    entitlements:
      path: entitlements/Widget.entitlements
    info:
      path: Info-Widget.plist
      properties:
        CFBundleDisplayName: Nyhedsoverblik Widget
        CFBundleName: NyhedsoverblikWidget
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundlePackageType: XPC!
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dk.nyhedsoverblik.app.widget
        PRODUCT_NAME: NyhedsoverblikWidget
        DEVELOPMENT_TEAM: X7P2566P6D
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  Nyhedsoverblik:
    build:
      targets:
        Nyhedsoverblik: all
        NyhedsoverblikWidget: all
    run:
      config: Debug
    archive:
      config: Release
